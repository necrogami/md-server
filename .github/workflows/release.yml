name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  PHP_VERSION: '8.4'
  MICRO_PHP_VERSION: '8.4.19'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv
          ini-values: phar.readonly=0
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-test-${{ hashFiles('composer.json') }}
          restore-keys: composer-test-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/pest --no-coverage

  build-phar:
    name: Build PHAR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv
          ini-values: phar.readonly=0
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-phar-${{ hashFiles('composer.json') }}
          restore-keys: composer-phar-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-dev --classmap-authoritative

      - name: Download Box
        run: curl -sL https://github.com/box-project/box/releases/latest/download/box.phar -o box.phar

      - name: Compile PHAR
        run: php box.phar compile

      - name: Verify PHAR
        run: APP_ENV=prod APP_DEBUG=0 php md-server.phar list

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-server-phar
          path: md-server.phar

  build-binaries:
    name: Build ${{ matrix.name }}
    needs: build-phar
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            micro_url: https://dl.static-php.dev/static-php-cli/common/php-8.4.19-micro-linux-x86_64.tar.gz
            binary_name: md-server-linux-x86_64
          - name: linux-aarch64
            micro_url: https://dl.static-php.dev/static-php-cli/common/php-8.4.19-micro-linux-aarch64.tar.gz
            binary_name: md-server-linux-aarch64
          - name: darwin-x86_64
            micro_url: https://dl.static-php.dev/static-php-cli/common/php-8.4.19-micro-macos-x86_64.tar.gz
            binary_name: md-server-darwin-x86_64
          - name: darwin-aarch64
            micro_url: https://dl.static-php.dev/static-php-cli/common/php-8.4.19-micro-macos-aarch64.tar.gz
            binary_name: md-server-darwin-aarch64

    steps:
      - name: Download PHAR
        uses: actions/download-artifact@v4
        with:
          name: md-server-phar

      - name: Download prebuilt micro.sfx
        run: |
          curl -sL "${{ matrix.micro_url }}" -o micro.tar.gz
          tar xzf micro.tar.gz
          ls -la micro.sfx

      - name: Combine micro + PHAR into static binary
        run: |
          cat micro.sfx md-server.phar > ${{ matrix.binary_name }}
          chmod +x ${{ matrix.binary_name }}
          ls -lh ${{ matrix.binary_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}

  release:
    name: Create Release
    needs: [build-phar, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          cp dist/md-server-phar/md-server.phar release/
          cp dist/md-server-linux-x86_64/md-server-linux-x86_64 release/
          cp dist/md-server-linux-aarch64/md-server-linux-aarch64 release/
          cp dist/md-server-darwin-x86_64/md-server-darwin-x86_64 release/
          cp dist/md-server-darwin-aarch64/md-server-darwin-aarch64 release/
          cd release && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
