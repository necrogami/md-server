name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  PHP_VERSION: '8.4'
  MICRO_PHP_VERSION: '8.4.19'
  MICRO_WIN_VERSION: '8.4.18'
  MICRO_BASE_URL: 'https://dl.static-php.dev/static-php-cli/common'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv
          ini-values: phar.readonly=0
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-test-${{ hashFiles('composer.json') }}
          restore-keys: composer-test-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/pest --no-coverage

  build-phar:
    name: Build PHAR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv
          ini-values: phar.readonly=0
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-phar-${{ hashFiles('composer.json') }}
          restore-keys: composer-phar-

      - name: Stamp version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s/CURRENT = 'dev'/CURRENT = '${VERSION}'/" src/Version.php
          cat src/Version.php

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-dev --classmap-authoritative

      - name: Download Box
        run: curl -sL https://github.com/box-project/box/releases/latest/download/box.phar -o box.phar

      - name: Compile PHAR
        run: php box.phar compile

      - name: Verify PHAR
        run: APP_ENV=prod APP_DEBUG=0 php md-server.phar list

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-server-phar
          path: md-server.phar

  release:
    name: Build binaries & Release
    needs: build-phar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download PHAR
        uses: actions/download-artifact@v4
        with:
          name: md-server-phar

      - name: Build static binaries
        run: |
          mkdir -p release/
          cp md-server.phar release/

          # Unix targets (tar.gz from common/)
          targets="linux-x86_64 linux-aarch64 macos-x86_64 macos-aarch64"
          for target in $targets; do
            echo "::group::Building md-server-${target}"
            curl -sL "${MICRO_BASE_URL}/php-${MICRO_PHP_VERSION}-micro-${target}.tar.gz" -o micro.tar.gz
            tar xzf micro.tar.gz
            output_name="md-server-$(echo $target | sed 's/macos/darwin/')"
            cat micro.sfx md-server.phar > "release/${output_name}"
            chmod +x "release/${output_name}"
            ls -lh "release/${output_name}"
            rm -f micro.tar.gz micro.sfx
            echo "::endgroup::"
          done

          # Windows target (zip from windows/spc-max/, slightly older PHP)
          echo "::group::Building md-server-windows-x86_64"
          curl -sL "https://dl.static-php.dev/static-php-cli/windows/spc-max/php-${MICRO_WIN_VERSION}-micro-win.zip" -o micro-win.zip
          unzip -o micro-win.zip
          cat micro.sfx md-server.phar > "release/md-server-windows-x86_64.exe"
          ls -lh "release/md-server-windows-x86_64.exe"
          rm -f micro-win.zip micro.sfx
          echo "::endgroup::"

      - name: Generate checksums
        run: cd release && sha256sum * > checksums.txt

      - name: Generate release notes
        id: notes
        run: |
          # Find previous tag
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "NOTES<<RELEASE_EOF"

            # Group commits by type
            FEATURES=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep -i "^feat" | sed 's/^feat[:(]*//' | sed 's/^[[:space:]]*/- /' || true)
            FIXES=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep -i "^fix" | sed 's/^fix[:(]*//' | sed 's/^[[:space:]]*/- /' || true)
            OTHER=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep -iv "^feat\|^fix\|^docs\|^ci\|^chore\|^style\|^refactor" | sed 's/^/- /' || true)
            DOCS=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep -i "^docs" | sed 's/^docs[:(]*//' | sed 's/^[[:space:]]*/- /' || true)

            if [ -n "$FEATURES" ]; then
              echo "## Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "## Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "## Documentation"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "## Other"
              echo "$OTHER"
              echo ""
            fi

            echo "## Artifacts"
            echo ""
            echo "| File | Platform | Requires |"
            echo "|------|----------|----------|"
            echo "| \`md-server.phar\` | Any | PHP 8.2+ |"
            echo "| \`md-server-linux-x86_64\` | Linux x86_64 | None |"
            echo "| \`md-server-linux-aarch64\` | Linux ARM64 | None |"
            echo "| \`md-server-darwin-x86_64\` | macOS Intel | None |"
            echo "| \`md-server-darwin-aarch64\` | macOS Apple Silicon | None |"
            echo "| \`md-server-windows-x86_64.exe\` | Windows x64 | None |"
            echo ""
            echo "### Quick start"
            echo "\`\`\`bash"
            echo "# PHAR"
            echo "php md-server.phar serve --root=./docs"
            echo ""
            echo "# Static binary (no PHP needed)"
            echo "chmod +x md-server-linux-x86_64"
            echo "./md-server-linux-x86_64 serve --root=./docs"
            echo "\`\`\`"

            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.NOTES }}
          files: release/*
